[package]
name = "kashtheking/gui-handler"
authors = ["KashTheKing"]
description = "An object oriented Gui Handler class for Roblox. Uses Sleitnick's Trove and Signal for easy cleanup and use, as well as a configurable setup for each Gui Handler and full type checking in strict. If you want an easy way to make show/hide tweens for Guis in your game, this module is for you. Previous versions are broken, DO NOT USE THEM!"
version = "1.0.1"
registry = "https://github.com/UpliftGames/wally-index"
realm = "shared"
exclude = ["rokit.toml"]

[dependencies]
Signal = "sleitnick/signal@2.0.3"
Trove = "sleitnick/trove@1.5.1"