[package]
name = "kashtheking/state-manager"
authors = ["KashTheKing"]
description = "A state manager for Roblox that uses Sleitnick's Trove and Signal for easy cleanup and use, as well as a configurable setup for each StateManager and full type checking in strict. If you want an easy way to handle state in your game, this module is for you. Previous versions are broken, DO NOT USE THEM!"
version = "2.1.1"
registry = "https://github.com/UpliftGames/wally-index"
realm = "shared"
exclude = ["rokit.toml"]

[dependencies]
Signal = "sleitnick/signal@2.0.3"
Trove = "sleitnick/trove@1.5.1"