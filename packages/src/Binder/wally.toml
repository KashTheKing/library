[package]
name = "kashtheking/binder"
version = "0.6.3"
description = "An instance-lifecycle Binder class for your binding needs, with filters like class whitelist, ancestry whitelist, tags, and predicates. Uses Sleitnick's Trove and Signal modules."
registry = "https://github.com/UpliftGames/wally-index"
realm = "shared"

[dependencies]
Trove = "sleitnick/trove@1.8.0"
Signal = "sleitnick/signal@2.0.3"
Predicates = "kashtheking/predicates@0.2.3"