[package]
name = "kashtheking/mechanic"
authors = ["KashTheKing"]
description = "A component style binder for Roblox that uses CollectionService tags. Uses Sleitnick's Trove and Signal for easy cleanup and use, as well as a configurable setup for each Mechanic and full type checking in strict. If you want an easy way to make Instances do things in your game, this module is for you. Previous versions are broken, DO NOT USE THEM!"
version = "4.0.3"
registry = "https://github.com/UpliftGames/wally-index"
realm = "shared"
exclude = ["rokit.toml"]

[dependencies]
Signal = "sleitnick/signal@2.0.3"
Trove = "sleitnick/trove@1.5.1"