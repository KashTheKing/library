[package]
name = "kashtheking/sound-pool"
description = "A SoundPool class. Useful for SFX in fighting games. Uses Sleitnick's trove and signal packages along with frqstbite's object-pool package."
version = "0.1.0"
registry = "https://github.com/UpliftGames/wally-index"
realm = "shared"

[dependencies]
Trove = "sleitnick/trove@1.8.0"
Signal = "sleitnick/signal@2.0.3"
ObjectPool = "frqstbite/object-pool@1.0.2"